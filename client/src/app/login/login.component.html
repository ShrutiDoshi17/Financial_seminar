<div class="login-wrapper">
  <div class="login-card">

    <div class="top-border"></div>

    <h2 class="title">
      FINANCIAL SEMINAR AND<br />
      WORKSHOP MANAGEMENT PLATFORM
    </h2>

    <p class="subtitle">
      Please enter your user and password!
    </p>

    <!-- Error Message -->
    <div *ngIf="showError" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="name@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="******" />
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="itemForm.invalid">
        Login
      </button>

    </form>

    <div class="register-link">
      Don't have an account?
      <span (click)="registration()">Registration</span>
    </div>

  </div>
</div>
