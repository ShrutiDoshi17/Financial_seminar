<div *ngIf="responseMessage" class="alert alert-success mt-4" role="alert">
  {{ responseMessage }}
</div>

<div class="row">
  <div class="col-md-8">
    <div class="row mt-3">
      <div class="card">
        <div class="card-header">Event Information</div>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Sr#</th>
                <th>Title</th>
                <th>Schedule</th>
                <th>Location</th>
                <th>Status</th>
                <th>Description</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let event of eventList">
                <td>{{event.id}}</td>
                <td>{{event.title}}</td>
                <td>{{event.schedule}}</td>
                <td>{{event.location}}</td>
                <td>{{event.status}}</td>
                <td>{{event.description}}</td>
                <td>
                  <button (click)="addRemarks(event)" class="btn btn-primary">Add Remarks</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  
  <div class="col-md-4">
    <div class="card">
      <div class="card-header">
        Add Remarks
      </div>
      <div class="card-body">
        <form class="mb-3 mt-md-4">
          <div class="row">
            <h6>{{selectedEvent.title}}</h6>
            <br>
            <div class="col-md-12">
              <div class="mb-3">
                <label for="status" class="form-label ">Feedback</label>
                <textarea rows="3" name="content" class="form-control" placeholder="Content" type="text"
                  [(ngModel)]="formModel.content"></textarea>
              </div>
            </div>
            <div class="col-md-2">
              <div class="d-grid">
                <br>
                <button (click)="saveFeedBack()" class="btn btn-outline-dark mt-1" type="submit">Submit</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
