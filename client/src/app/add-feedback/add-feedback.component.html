<div class="container mt-4">
    <h3>Add Feedback</h3>

    <!-- Success Message  -->
    <div *ngIf = "showMessage" class="alert alert-success">
       {{ responseMessage }}
    </div>

    <!-- Error Message  -->
    <div *ngIf = "showError" class="alert alert-danger">
       {{ errorMessage }}
    </div>

    <!-- Events Table -->
    <div *ngIf = "!isAddRemarks">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                <th>Description</th>
                <th>Schedule</th>
                <th>Location</th>
                <th>Status</th>
                <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor = "let event of eventList">
                    <td>{{ event.title }}</td>
                    <td>{{ event.description }}</td>
                    <td>{{ event.schedule }}</td>
                    <td>{{ event.location }}</td>
                    <td>{{ event.status }}</td>
                    <td>{{ event.action }}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" (click) = "addRemarks(event)">
                            Add Feedback
                        </button>
                    </td>
                </tr>
                <tr *ngIf = "eventList.length === 0">
                    <td colspan="6" class="text-center">No events assigned</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Feedback Form -->
    <div *ngIf = "isAddRemarks" class="mt-3">
        <h5>Submitting feedback for: <strong>{{ selectedEvent.title }}</strong></h5>
        <div class="form-group mb-3">
            <label for="feedback">Feedback Content</label>
            <textarea 
                name="feedback"
                id="feedback"
                [(ngModel)] = "formModel.content"
                class="form-control"
                rows="4"
                placeholder="Enter your feedback here..."
            >
            </textarea>
        </div>
        <button class="btn btn-success me-2" (click) = "saveFeedback()">Submit Feedback</button>
        <button class="btn btn-secondary" (click) = "isAddRemarks = false">Cancel</button>
    </div>
</div>
