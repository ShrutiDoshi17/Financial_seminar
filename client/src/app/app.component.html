<div class="app-wrapper">

  <!-- NAVBAR — hide on login and registration pages -->
  <nav class="navbar navbar-expand-lg custom-navbar px-4" *ngIf="IsLoggin">

    <!-- Brand -->
    <a class="navbar-brand" href="#">
      <span class="brand-text">Fin<span class="brand-accent">Seminar</span></span>
    </a>

    <!-- Mobile Toggler -->
    <button class="navbar-toggler custom-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <i class="fas fa-bars"></i>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Role Badge -->
      <div class="role-badge ms-3 me-4" *ngIf="IsLoggin">
        <i class="fas fa-building" *ngIf="roleName === 'INSTITUTION'"></i>
        <i class="fas fa-user-tie" *ngIf="roleName === 'PROFESSIONAL'"></i>
        <i class="fas fa-graduation-cap" *ngIf="roleName === 'PARTICIPANT'"></i>
        <span>{{ roleName }}</span>
      </div>

      <!-- Nav Links — centered -->
      <ul class="navbar-nav mx-auto">

        <!-- INSTITUTION Links -->
        <li class="nav-item" *ngIf="roleName === 'INSTITUTION'">
          <a class="nav-link custom-link" [routerLink]="['/create-event']"
            routerLinkActive="active-link">
            <i class="fas fa-calendar-plus me-1"></i>
            Create Event
          </a>
        </li>
        <li class="nav-item" *ngIf="roleName === 'INSTITUTION'">
          <a class="nav-link custom-link" [routerLink]="['/add-resource']"
            routerLinkActive="active-link">
            <i class="fas fa-box me-1"></i>
            Add Resource
          </a>
        </li>
        <li class="nav-item" *ngIf="roleName === 'INSTITUTION'">
          <a class="nav-link custom-link" [routerLink]="['/assign-professional']"
            routerLinkActive="active-link">
            <i class="fas fa-user-check me-1"></i>
            Assign Professional
          </a>
        </li>

        <!-- PROFESSIONAL Links -->
        <li class="nav-item" *ngIf="roleName === 'PROFESSIONAL'">
          <a class="nav-link custom-link" [routerLink]="['/update-event-status']"
            routerLinkActive="active-link">
            <i class="fas fa-sync-alt me-1"></i>
            Update Event Status
          </a>
        </li>
        <li class="nav-item" *ngIf="roleName === 'PROFESSIONAL'">
          <a class="nav-link custom-link" [routerLink]="['/add-feedback']"
            routerLinkActive="active-link">
            <i class="fas fa-comment-alt me-1"></i>
            Add Feedback
          </a>
        </li>

        <!-- PARTICIPANT Links -->
        <li class="nav-item" *ngIf="roleName === 'PARTICIPANT'">
          <a class="nav-link custom-link" [routerLink]="['/view-events']"
            routerLinkActive="active-link">
            <i class="fas fa-calendar-alt me-1"></i>
            View Events
          </a>
        </li>

      </ul>

      <!-- Right Side — Logout -->
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" *ngIf="IsLoggin">
          <button class="btn btn-logout" (click)="logout()">
            <i class="fas fa-sign-out-alt me-2"></i>
            Logout
          </button>
        </li>
      </ul>

    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-content">
    <router-outlet></router-outlet>
  </div>

</div>
