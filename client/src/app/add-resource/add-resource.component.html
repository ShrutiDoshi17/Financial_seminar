<div class="container mt-4 add-resource-container">
  <h3 class="mb-3">Add Resource</h3>

  <!-- Success Message -->
  <div *ngIf="showMessage" class="alert alert-success">
    {{ responseMessage }}
  </div>

  <!-- Error Message -->
  <div *ngIf="showError" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    
    <div class="mb-3">
      <label for="eventId" class="form-label">Event</label>
      <select
        id="eventId"
        class="form-select"
        formControlName="eventId">
        <option value="">Select Event</option>
        <option *ngFor="let event of eventList" [value]="event.id">
          {{ event.title }}
        </option>
      </select>

      <small class="text-danger"
        *ngIf="itemForm.get('eventId')?.touched && itemForm.get('eventId')?.invalid">
        Event is required
      </small>
    </div>

    <div class="mb-3">
      <label for="type" class="form-label">Resource Type</label>
      <input
        type="text"
        id="type"
        class="form-control"
        formControlName="type"
        placeholder="Enter resource type" />

      <small class="text-danger"
        *ngIf="itemForm.get('type')?.touched && itemForm.get('type')?.invalid">
        Resource type is required
      </small>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea
        id="description"
        rows="3"
        class="form-control"
        formControlName="description"
        placeholder="Enter description">
      </textarea>

      <small class="text-danger"
        *ngIf="itemForm.get('description')?.touched && itemForm.get('description')?.invalid">
        Description is required
      </small>
    </div>

    <div class="mb-3">
      <label for="availabilityStatus" class="form-label">Availability Status</label>
      <select
        id="availabilityStatus"
        class="form-select"
        formControlName="availabilityStatus">
        <option value="">Select Status</option>
        <option value="AVAILABLE">Available</option>
        <option value="UNAVAILABLE">Unavailable</option>
      </select>

      <small class="text-danger"
        *ngIf="itemForm.get('availabilityStatus')?.touched &&
               itemForm.get('availabilityStatus')?.invalid">
        Status is required
      </small>
    </div>

    <button type="submit" class="btn btn-primary">
      Add Resource
    </button>
  </form>
</div>
