<div *ngIf="responseMessage" class="alert alert-success mt-4" role="alert">
  {{ responseMessage }}
</div>

<div class="d-flex justify-content-between mt-4">
  <h2 class="mb-0">Assign Professional</h2>
</div>

<div class="row mt-3">
  <div class="card">
    <div class="card-body">
      <form class="mb-3 mt-md-4" [formGroup]="itemForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-3">
            <div class="mb-3">
              <label for="eventId" class="form-label">Event</label>
              <select name="eventId" formControlName="eventId" class="form-control" id="eventId">
                <option value="null">Choose Event</option>
                <option *ngFor="let val of eventList" [value]="val.id">{{val.title}}</option>
              </select>
              <div
                *ngIf="itemForm.controls['eventId'].invalid && (itemForm.controls['eventId'].dirty || itemForm.controls['eventId'].touched)"
                class="ng-dirty">
                <span *ngIf="itemForm.controls['eventId'].errors">
                  <span class="text-danger">Please Choose Event.</span>
                </span>
              </div>
            </div>
          </div>
          
          <div class="col-md-3">
            <div class="mb-3">
              <label for="userId" class="form-label">Professional</label>
              <select name="userId" formControlName="userId" class="form-control" id="userId">
                <option value="null">Choose Professional</option>
                <option *ngFor="let val of professionalsList" [value]="val.id">{{val.username}}</option>
              </select>
              <div
                *ngIf="itemForm.controls['userId'].invalid && (itemForm.controls['userId'].dirty || itemForm.controls['userId'].touched)"
                class="ng-dirty">
                <span *ngIf="itemForm.controls['userId'].errors">
                  <span class="text-danger">Please Choose Professional.</span>
                </span>
              </div>
            </div>
          </div>

          <div class="col-md-2">
            <div class="d-grid">
              <br>
              <button class="btn btn-outline-dark mt-1" type="submit">Submit</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
