<div class="row">
  <div class="col-md-8">
    <div class="card" *ngIf="updateId">
      <div class="card-header">
        Update Status
      </div>
      <div class="card-body">
        <form class="mb-3 mt-md-4">
          <div class="row">
            <div class="col-md-3">
              <div class="mb-3">
                <label for="status" class="form-label ">Status</label>
                <select class="form-control" name="status" id="status" [(ngModel)]="formModel.status">
                  <option value="null">Choose Status</option>
                  <option value="Start">Start</option>
                  <option value="Processing">Processing</option>
                  <option value="Complete">Complete</option>
                </select>
              </div>
            </div>
            <div class="col-md-2">
              <div class="d-grid">
                <br>
                <button (click)="updateStatus()" class="btn btn-outline-dark mt-1" type="submit">Submit</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div *ngIf = "showMessage" class="alert alert-success">
      <span>{{ responseMessage }}</span>
    </div>

    <div class="row mt-3">
      <div class="card">
        <div class="card-header">Event Information</div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Sr.</th>
                <th>Title</th>
                <th>Schedule</th>
                <th>Location</th>
                <th>Status</th>
                <th>Description</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let event of eventList">
                <td>{{event.id}}</td>
                <td>{{event.title}}</td>
                <td>{{event.schedule}}</td>
                <td>{{event.location}}</td>
                <td>{{event.status}}</td>
                <td>{{event.description}}</td>
                <td>
                  <button (click)="addStatus(event)" class="btn btn-warning mx-2">Update Status</button>
                  <!-- <button (click)="addRemarks(event)" class="btn btn-primary">Add Remarks</button> -->
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
