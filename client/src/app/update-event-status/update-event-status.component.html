<div class="container mt-4 update-status-container">

  <h3 class="mb-3 text-center">Update Event Status</h3>

  <!-- Error Message -->
  <div *ngIf="showError" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- Success Message -->
  <div *ngIf="showMessage" class="alert alert-success">
    {{ reponseMessage }}
  </div>

  <!-- Events Table -->
  <div *ngIf="!isAddRemarks">
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Event ID</th>
          <th>Title</th>
          <th>Status</th>
          <th>Update</th>
          <th>Remarks</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let event of eventList">
          <td>{{ event.eventId }}</td>
          <td>{{ event.title }}</td>
          <td>{{ event.status }}</td>
          <td>
            <button
              class="btn btn-sm btn-primary"
              (click)="addStatus(event)">
              Update Status
            </button>
          </td>
          <td>
            <button
              class="btn btn-sm btn-secondary"
              (click)="addRemarks(event)">
              Add Remarks
            </button>
          </td>
        </tr>

        <tr *ngIf="eventList.length === 0">
          <td colspan="5" class="text-center">
            No events available
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Update Status Form -->
  <div *ngIf="updateId && !isAddRemarks" class="mt-4">
    <h5>Update Status for Event ID: {{ updateId }}</h5>

    <div class="mb-3">
      <label class="form-label">Select Status</label>
      <select
        class="form-select"
        [(ngModel)]="formModel.status">
        <option value="">Select Status</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="INACTIVE">INACTIVE</option>
        <option value="COMPLETED">COMPLETED</option>
      </select>
    </div>

    <button class="btn btn-success" (click)="updateStatus()">
      Save Status
    </button>
  </div>

  <!-- Remarks Section -->
  <div *ngIf="isAddRemarks" class="mt-4">
    <h5>
      Add Remarks for Event:
      <strong>{{ selectedEvent?.title }}</strong>
    </h5>

    <div class="mb-3">
      <label class="form-label">Remarks</label>
      <textarea
        rows="4"
        class="form-control"
        [(ngModel)]="selectedEvent.remarks"
        placeholder="Enter remarks">
      </textarea>
    </div>

    <button
      class="btn btn-success me-2"
      (click)="saveFeedBack()">
      Save Remarks
    </button>

    <button
      class="btn btn-secondary"
      (click)="isAddRemarks = false">
      Cancel
    </button>
  </div>

</div>
