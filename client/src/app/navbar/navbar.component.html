<nav class="fs-navbar">
  <div class="fs-navbar__inner">

    <!-- Brand — always goes to landing -->
    <a class="fs-navbar__brand" (click)="goToLanding()">
      <div class="fs-navbar__brand-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <span class="fs-navbar__brand-text">
        Fin<span class="accent">Seminar</span>
      </span>
    </a>

    <!-- Mobile Burger -->
    <button class="fs-navbar__toggler" type="button" (click)="toggleMenu()" [class.open]="menuOpen"
      aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Menu -->
    <div class="fs-navbar__menu" [class.show]="menuOpen">

      <!-- ── LOGGED OUT — Landing nav links ── -->
      <ng-container *ngIf="!IsLoggin">
        <ul class="fs-navbar__links">
          <li>
            <a (click)="scrollToSection('home')">
              <i class="fas fa-home"></i><span>Home</span>
            </a>
          </li>
          <li>
            <a (click)="scrollToSection('about')">
              <i class="fas fa-info-circle"></i><span>About</span>
            </a>
          </li>
          <li>
            <a (click)="scrollToSection('contact')">
              <i class="fas fa-envelope"></i><span>Contact</span>
            </a>
          </li>
        </ul>

        <div class="fs-navbar__divider"></div>

        <button class="fs-navbar__btn-login" (click)="goToLogin()">
          <i class="fas fa-sign-in-alt"></i><span>Sign In</span>
        </button>
        <button class="fs-navbar__btn-register" (click)="goToRegister()">
          <i class="fas fa-user-plus"></i><span>Register</span>
        </button>
      </ng-container>

      <!-- ── LOGGED IN — Role based links ── -->
      <ng-container *ngIf="IsLoggin">



        <!-- Role Badge -->
        <div class="fs-navbar__role-badge">
          <i class="fas" [ngClass]="{
              'fa-building':   roleName === 'INSTITUTION',
              'fa-user-tie':   roleName === 'PROFESSIONAL',
              'fa-users':      roleName === 'PARTICIPANT'
            }">
          </i>
          <span>{{ roleName }}</span>
        </div>

        <!-- Nav Links -->
        <ul class="fs-navbar__links">

          <!-- Back to Home always visible when logged in -->
          <li>
            <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}"
              (click)="closeMenu()">
              <i class="fas fa-home"></i><span>Home</span>
            </a>
          </li>
          
          <li>
            <a routerLink="/dashboard" routerLinkActive="active-link" (click)="closeMenu()">
              <i class="fas fa-gauge"></i><span>Dashboard</span>
            </a>
          </li>


          <!-- INSTITUTION -->
          <ng-container *ngIf="roleName === 'INSTITUTION'">
            <li>
              <a routerLink="/create-event" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-calendar-plus"></i><span>Create Event</span>
              </a>
            </li>
            <li>
              <a routerLink="/add-resource" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-folder-plus"></i><span>Add Resource</span>
              </a>
            </li>
            <li>
              <a routerLink="/assign-professional" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-user-check"></i><span>Assign Professional</span>
              </a>
            </li>
          </ng-container>

          <!-- PROFESSIONAL -->
          <ng-container *ngIf="roleName === 'PROFESSIONAL'">
            <li>
              <a routerLink="/update-event-status" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-sync-alt"></i><span>Update Status</span>
              </a>
            </li>
            <li>
              <a routerLink="/add-feedback" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-comment-dots"></i><span>Add Feedback</span>
              </a>
            </li>
          </ng-container>

          <!-- PARTICIPANT -->
          <ng-container *ngIf="roleName === 'PARTICIPANT'">
            <li>
              <a routerLink="/view-events" routerLinkActive="active-link" (click)="closeMenu()">
                <i class="fas fa-list-alt"></i><span>View Events</span>
              </a>
            </li>
          </ng-container>

        </ul>

        <!-- Logout -->
        <button class="fs-navbar__logout" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </button>

      </ng-container>

    </div>
  </div>
</nav>
