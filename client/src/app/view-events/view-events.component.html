<div *ngIf="responseMessage" class="alert alert-success mt-4" role="alert">
  {{ responseMessage }}
</div>
<div class="d-flex justify-content-between mt-4">
  <h2 class="mb-0">Manage Events</h2>
</div>

<div class="row mt-3">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">Event Information</div>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Sr.</th>
              <th>Title</th>
              <th>Schedule</th>
              <th>Location</th>
              <th>Status</th>
              <th>Description</th>
              <td>Status</td>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let event of eventList">
              <td>{{event.id}}</td>
              <td>{{event.title}}</td>
              <td>{{event.schedule}}</td>
              <td>{{event.location}}</td>
              <td>{{event.status}}</td>
              <td>{{event.description}}</td>
              <td>
                <div *ngFor="let d of event.enrollments">
                  <h5>{{ d.status }}</h5>
                </div>
              </td>
              <td>
                <button class="btn btn-warning" (click)="viewDetails(event)">View Details</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div *ngIf="selectedEvent.id" class="col-md-4">
    <div class="row">
      <div class="col-sm-6">
        <button *ngIf="selectedEvent.enrollments.length==0" (click)="enroll()" class="btn btn-danger">Enroll
          Now</button>
        <button *ngIf="selectedEvent.enrollments.length>0" (click)="checkStatus()" class="btn btn-primary">Check
          Status</button>
      </div>
      <div class="col-sm-6">
        <div class="text-danger">
          <h5>Status:{{status}}</h5>
        </div>
      </div>
    </div>
    <hr>
    <h4>Feedback</h4>
    <div *ngFor="let r of selectedEvent.feedbacks">
      <span>{{r.content}}</span>
      <p>{{r.timestamp}}</p>
      <hr>
    </div>
    <form class="mb-3 mt-md-4">
      <div class="row">

        <br>
        <div class="col-md-12">
          <div class="mb-3">
            <label for="status" class="form-label ">Feedback</label>
            <textarea rows="3" name="content" class="form-control" placeholder="Content" type="text"
              [(ngModel)]="formModel.content"></textarea>
          </div>
        </div>
        <div class="col-md-2">
          <div class="d-grid">
            <br>
            <button (click)="saveFeedBack()" class="btn btn-outline-dark mt-1" type="submit">Submit</button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
